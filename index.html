<head>
    <meta charset="UTF-8">

    <title>ZerionX Gallery</title>
    <style>
        /* --- CSS STYLES (Schwarz & Orange) --- */
        :root {
            --bg-color: #050505;       /* Tiefschwarz */
            --card-bg: #121212;        /* Dunkelgrau für Karten */
            --accent-orange: #ff9900;  /* ZerionX Orange */
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Header */
        header {
            background-color: rgba(5, 5, 5, 0.95);
            border-bottom: 2px solid var(--accent-orange);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo img {
            height: 50px; /* Logo Größe */
            width: auto;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--accent-orange);
        }

        /* Hauptbereich */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        h2 {
            border-left: 5px solid var(--accent-orange);
            padding-left: 15px;
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }

        /* Bilder Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 15px rgba(255, 153, 0, 0.3);
            border-color: var(--accent-orange);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .card-info {
            padding: 15px;
        }

        .card-title {
            color: var(--accent-orange);
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* Video Bereich */
        .video-section {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .video-wrapper {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
            border-top: 1px solid #333;
            color: var(--text-dim);
        }
    </style>
