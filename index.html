<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZERION | Future Commerce</title>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #bd00ff;
            --accent: #ff0055;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --success: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated Background */
        .background-waves {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #000000 100%);
            overflow: hidden;
        }

        .wave {
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(189, 0, 255, 0.1), transparent);
            border-radius: 40%;
            animation: rotate 15s infinite linear;
        }

        .wave:nth-child(2) {
            bottom: -60%;
            left: -60%;
            background: linear-gradient(45deg, transparent, rgba(0, 242, 255, 0.1), transparent);
            animation: rotate 20s infinite reverse linear;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .particle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-100px) translateX(50px); }
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Header with Logo */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            margin-bottom: 3rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        .logo-text {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            position: relative;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        nav a:hover, nav a.active {
            background: rgba(0, 242, 255, 0.1);
            color: var(--primary);
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent);
            color: white;
            font-size: 0.8rem;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
            justify-content: center;
        }

        .tab-btn {
            padding: 1rem 2rem;
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tab-btn:hover, .tab-btn.active {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-color: transparent;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        /* Sections */
        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Shop Grid */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .product-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            position: relative;
            overflow: hidden;
        }

        .product-image::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        .product-card:hover .product-image::before {
            top: -100%;
            left: -100%;
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-title {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--success);
            margin-bottom: 1rem;
        }

        .add-to-cart {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .add-to-cart:hover {
            box-shadow: 0 0 20px var(--primary);
            transform: scale(1.05);
        }

        /* Product Creator */
        .creator-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: start;
        }

        .preview-area {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .preview-item {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            margin-bottom: 1rem;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            transition: 0.3s;
        }

        .controls-area {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
        }

        .control-group {
            margin-bottom: 2rem;
        }

        .control-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--primary);
            font-weight: bold;
        }

        .color-picker {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: 0.3s;
        }

        .color-option:hover, .color-option.selected {
            border-color: white;
            transform: scale(1.2);
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        .create-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(45deg, var(--accent), var(--secondary));
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .create-btn:hover {
            box-shadow: 0 0 30px var(--accent);
            transform: scale(1.02);
        }

        /* Cart Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .cart-total {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--success);
            margin-top: 2rem;
            text-align: right;
        }

        .checkout-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(45deg, var(--success), var(--primary));
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 1rem; }
            .creator-container { grid-template-columns: 1fr; }
            .nav-tabs { flex-wrap: wrap; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- Background Animation -->
    <div class="background-waves">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo-container">
                <!-- Hier dein Logo einfügen -->
                <img src="https://chatgpt.com/backend-api/estuary/content?id=file_0000000043e871f4856af8d1c6a60702&ts=493530&p=fs&cid=1&sig=8b73d813960b654ce03c42d7e80ffcd8720c068478be243d3d956f8649d66780&v=0" alt="Zerion Logo" class="logo-img" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMzAiIGN5PSIzMCIgcj0iMjUiIGZpbGw9InVybCgjZ3JhZGllbnQpIi8+PGRlZnM+PGxpbmVhckdyYWRpZW50IGlkPSJncmFkaWVudCIgeDE9IjAlIiB5MT0iMCUiIHgyPSIxMDAlIiB5Mj0iMTAwJSI+PHN0b3Agb2Zmc2V0PSIwJSIgc3R5bGU9InN0b3AtY29sb3I6IzAwZjJmZjtzdG9wLW9wYWNpdHk6MSIgLz48c3RvcCBvZmZzZXQ9IjEwMCUiIHN0eWxlPSJzdG9wLWNvbG9yOiNiZDAwZmY7c3RvcC1vcGFjaXR5OjEiIC8+PC9saW5lYXJHcmFkaWVudD48L2RlZnM+PC9zdmc+'">
                <div class="logo-text">ZERION</div>
            </div>
            <nav>
                <a href="#" class="active" onclick="showSection('shop')">Shop</a>
                <a href="#" onclick="showSection('creator')">Creator</a>
                <a href="#">About</a>
                <div class="cart-icon" onclick="toggleCart()">
                    🛒
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </nav>
        </header>

        <!-- Navigation Tabs -->
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="showSection('shop')">🛍️ Shop</button>
            <button class="tab-btn" onclick="showSection('creator')">🎨 Produkt erstellen</button>
        </div>

        <!-- Shop Section -->
        <section id="shop" class="section active">
            <h1 style="text-align: center; margin-bottom: 3rem; font-size: 3rem;">
                <span style="background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ZERION SHOP</span>
            </h1>
            <div class="shop-grid" id="shopGrid">
                <!-- Products will be loaded here -->
            </div>
        </section>

        <!-- Creator Section -->
        <section id="creator" class="section">
            <h1 style="text-align: center; margin-bottom: 3rem; font-size: 3rem;">
                <span style="background: linear-gradient(to right, var(--accent), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">PRODUKT CREATOR</span>
            </h1>
            <div class="creator-container">
                <div class="preview-area">
                    <div class="preview-item" id="previewItem">👕</div>
                    <h3 id="previewName">Dein Custom Produkt</h3>
                    <p id="previewPrice">Preis: 29.99 €</p>
                </div>
                <div class="controls-area">
                    <div class="control-group">
                        <label class="control-label">Produkttyp</label>
                        <select id="productType" onchange="updatePreview()">
                            <option value="shirt">T-Shirt 👕</option>
                            <option value="hoodie">Hoodie 🧥</option>
                            <option value="cap">Cap 🧢</option>
                            <option value="poster">Poster 🖼️</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label class="control-label">Farbe wählen</label>
                        <div class="color-picker">
                            <div class="color-option selected" style="background: #00f2ff" onclick="selectColor(this, '#00f2ff')"></div>
                            <div class="color-option" style="background: #bd00ff" onclick="selectColor(this, '#bd00ff')"></div>
                            <div class="color-option" style="background: #ff0055" onclick="selectColor(this, '#ff0055')"></div>
                            <div class="color-option" style="background: #00ff88" onclick="selectColor(this, '#00ff88')"></div>
                            <div class="color-option" style="background: #ffff00" onclick="selectColor(this, '#ffff00')"></div>
                            <div class="color-option" style="background: #ffffff" onclick="selectColor(this, '#ffffff')"></div>
                        </div>
                    </div>
                    <div class="control-group">
                        <label class="control-label">Produktname</label>
                        <input type="text" id="productName" placeholder="Gib deinem Produkt einen Namen..." oninput="updatePreview()">
                    </div>
                    <div class="control-group">
                        <label class="control-label">Preis (€)</label>
                        <input type="number" id="productPrice" value="29.99" min="1" step="0.01" oninput="updatePreview()">
                    </div>
                    <button class="create-btn" onclick="createProduct()">✨ Produkt erstellen & zum Shop hinzufügen</button>
                </div>
            </div>
        </section>
    </div>

    <!-- Cart Modal -->
    <div class="modal" id="cartModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🛒 Dein Warenkorb</h2>
                <button class="close-modal" onclick="toggleCart()">×</button>
            </div>
            <div id="cartItems"></div>
            <div class="cart-total" id="cartTotal">Gesamt: 0.00 €</div>
            <button class="checkout-btn" onclick="checkout()">💳 Zur Kasse</button>
        </div>
    </div>

    <script>
        // Sample products
        let products = [
            { id: 1, name: "Neon Hoodie", price: 49.99, emoji: "🧥", color: "#00f2ff" },
            { id: 2, name: "Cyber Cap", price: 24.99, emoji: "🧢", color: "#bd00ff" },
            { id: 3, name: "Void Poster", price: 19.99, emoji: "🖼️", color: "#ff0055" },
            { id: 4, name: "Quantum Shirt", price: 34.99, emoji: "👕", color: "#00ff88" }
        ];

        let cart = [];
        let selectedColor = '#00f2ff';

        // Initialize
        window.onload = function() {
            renderShop();
            createParticles();
        };

        // Create floating particles
        function createParticles() {
            const bg = document.querySelector('.background-waves');
            for(let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 5 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.animationDuration = `${Math.random() * 10 + 5}s`;
                particle.style.animationDelay = `${Math.random() * 5}s`;
                bg.appendChild(particle);
            }
        }

        // Show section
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');
        }

        // Render shop
        function renderShop() {
            const grid = document.getElementById('shopGrid');
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image" style="background: linear-gradient(135deg, ${product.color}22, ${product.color}44)">
                        ${product.emoji}
                    </div>
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">${product.price.toFixed(2)} €</div>
                        <button class="add-to-cart" onclick="addToCart(${product.id})">In den Warenkorb</button>
                    </div>
                </div>
            `).join('');
        }

        // Add to cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            cart.push(product);
            updateCartUI();
            
            // Animation feedback
            const btn = event.target;
            btn.textContent = "✓ Hinzugefügt!";
            btn.style.background = "var(--success)";
            setTimeout(() => {
                btn.textContent = "In den Warenkorb";
                btn.style.background = "";
            }, 1500);
        }

        // Update cart UI
        function updateCartUI() {
            document.getElementById('cartCount').textContent = cart.length;
            
            const cartItems = document.getElementById('cartItems');
            if(cart.length === 0) {
                cartItems.innerHTML = '<p style="text-align: center; color: #aaa;">Dein Warenkorb ist leer</p>';
            } else {
                cartItems.innerHTML = cart.map((item, index) => `
                    <div class="cart-item">
                        <div>
                            <strong>${item.emoji} ${item.name}</strong>
                            <div style="color: var(--success)">${item.price.toFixed(2)} €</div>
                        </div>
                        <button onclick="removeFromCart(${index})" style="background: var(--accent); border: none; color: white; padding: 0.5rem 1rem; border-radius: 5px; cursor: pointer;">Entfernen</button>
                    </div>
                `).join('');
            }
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cartTotal').textContent = `Gesamt: ${total.toFixed(2)} €`;
        }

        // Remove from cart
        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        // Toggle cart modal
        function toggleCart() {
            document.getElementById('cartModal').classList.toggle('active');
        }

        // Checkout
        function checkout() {
            if(cart.length === 0) {
                alert("Dein Warenkorb ist leer!");
                return;
            }
            alert(`Vielen Dank für deinen Einkauf bei ZERION!\nGesamtbetrag: ${cart.reduce((sum, item) => sum + item.price, 0).toFixed(2)} €\n\n(Demo-Modus)`);
            cart = [];
            updateCartUI();
            toggleCart();
        }

        // Creator functions
        function selectColor(element, color) {
            document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selectedColor = color;
            updatePreview();
        }

        function updatePreview() {
            const type = document.getElementById('productType').value;
            const name = document.getElementById('productName').value || 'Dein Custom Produkt';
            const price = document.getElementById('productPrice').value || '29.99';
            
            const emojis = {
                shirt: '👕',
                hoodie: '🧥',
                cap: '🧢',
                poster: '🖼️'
            };
            
            document.getElementById('previewItem').textContent = emojis[type];
            document.getElementById('previewItem').style.background = `linear-gradient(135deg, ${selectedColor}, ${selectedColor}88)`;
            document.getElementById('previewName').textContent = name;
            document.getElementById('previewPrice').textContent = `Preis: ${parseFloat(price).toFixed(2)} €`;
        }

        function createProduct() {
            const type = document.getElementById('productType').value;
            const name = document.getElementById('productName').value || 'Custom Produkt';
            const price = parseFloat(document.getElementById('productPrice').value) || 29.99;
            
            const emojis = {
                shirt: '👕',
                hoodie: '🧥',
                cap: '🧢',
                poster: '🖼️'
            };
            
            const newProduct = {
                id: Date.now(),
                name: name,
                price: price,
                emoji: emojis[type],
                color: selectedColor
            };
            
            products.unshift(newProduct);
            renderShop();
            
            alert(`✅ "${name}" wurde erfolgreich erstellt und zum Shop hinzugefügt!`);
            
            // Reset form
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '29.99';
            showSection('shop');
        }

        // Mouse move effect for cards
        document.addEventListener('mousemove', (e) => {
            document.querySelectorAll('.product-card').forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                if(x >= 0 && x <= rect.width && y >= 0 && y <= rect.height) {
                    card.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255,255,255,0.1), rgba(255,255,255,0.05))`;
                } else {
                    card.style.background = 'var(--glass)';
                }
            });
        });
    </script>
</body>
</html>
