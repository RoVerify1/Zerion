<!DOCTYPE html>
<html>
<head>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; background: #1e1e1e; color: white; }
        /* Linke Seite: Chat-Liste */
        .sidebar { width: 250px; background: #2c2c2c; border-right: 1px solid #444; padding: 10px; }
        /* Mitte: Chat-Fenster */
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .input-area { padding: 20px; background: #2c2c2c; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #3c3c3c; color: white; }
        button { padding: 10px 20px; background: #00a2ff; border: none; color: white; border-radius: 5px; cursor: pointer; }
        .code-display { font-family: monospace; background: #000; padding: 5px; color: #0f0; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Verlauf</h3>
        <div style="color: #888; font-size: 0.8em;">Keine Chats vorhanden</div>
    </div>
    <div class="chat-area">
        <div class="messages" id="chatBox">
            <div>KI: Hallo! Was soll ich heute für dein Roblox-Spiel erstellen?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="z.B. Mach mir ein Car Script...">
            <button onclick="sendRequest()">Senden</button>
        </div>
    </div>

    <script>
        async function sendRequest() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            if(!input.value) return;

            // Nachricht anzeigen
            chatBox.innerHTML += `<div>Du: ${input.value}</div>`;
            
            // Hier würdest du dein Vercel-Backend anrufen
            // Für den Test generieren wir eine zufällige ID
            const connectCode = Math.floor(1000 + Math.random() * 9000);
            
            chatBox.innerHTML += `<div>KI: Generiere Script...</div>`;
            setTimeout(() => {
                chatBox.innerHTML += `<div>KI: Fertig! Nutze Code <b class="code-display">${connectCode}</b> im Roblox Plugin.</div>`;
                input.value = "";
            }, 1500);
        }
    </script>
</body>
</html>
