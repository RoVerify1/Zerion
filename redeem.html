<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZERION | Code Einlösen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-waves">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo-container">
                <img id="siteLogo" src="logo.png" alt="Zerion Logo" class="logo-img" onerror="this.style.display='none'">
                <div class="logo-text">ZERION // REDEEM</div>
            </div>
            <nav>
                <a href="index.html">Shop</a>
                <a href="verify.html">Roblox Verify</a>
                <a href="redeem.html" class="active">Code einlösen</a>
            </nav>
        </header>

        <div style="max-width: 600px; margin: 4rem auto;">
            <div class="admin-section" style="text-align: center;">
                <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">🎟️ ALTERNATIVER CODE</h1>
                <p style="color: #aaa; margin-bottom: 2rem;">Für manuelle Codes vom Support</p>
                
                <input type="text" id="redeemCode" placeholder="XXXX-XXXX-XXXX" style="text-align: center; font-size: 1.5rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 1.5rem;">
                
                <button class="create-btn" onclick="redeemCode()">✅ Einlösen</button>
                
                <div id="errorMsg" class="error-msg" style="margin-top: 1rem;"></div>
            </div>

            <div id="downloadArea" style="display: none; margin-top: 2rem;">
                <div class="admin-section" style="text-align: center; border-color: var(--success);">
                    <h2 style="color: var(--success); margin-bottom: 1rem;">✅ Erfolgreich!</h2>
                    <div id="productInfo"></div>
                    <a id="downloadBtn" href="#" download class="btn-glitch" style="margin-top: 1.5rem; display: inline-block;">⬇️ DOWNLOAD</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            loadLogo();
        };

        function loadLogo() {
            const savedLogo = localStorage.getItem('zerion_logo');
            if(savedLogo) {
                document.getElementById('siteLogo').src = savedLogo;
                document.getElementById('siteLogo').style.display = 'block';
            }
        }

        function redeemCode() {
            const code = document.getElementById('redeemCode').value.trim().toUpperCase();
            const errorDiv = document.getElementById('errorMsg');
            const downloadArea = document.getElementById('downloadArea');
            
            errorDiv.style.display = 'none';
            downloadArea.style.display = 'none';

            if(!code) {
                errorDiv.textContent = '❌ Bitte Code eingeben!';
                errorDiv.style.display = 'block';
                return;
            }

            // Check if it's a Dev Code first
            const products = JSON.parse(localStorage.getItem('zerion_products')) || [];
            const product = products.find(p => p.devCode === code);

            if(product) {
                // Redirect to verify page
                window.location.href = `verify.html?code=${code}`;
                return;
            }

            // Otherwise show error
            errorDiv.textContent = '❌ Ungültiger Code! Nutze /verify für Developer-Codes.';
            errorDiv.style.display = 'block';
        }

        document.getElementById('redeemCode').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') redeemCode();
        });
    </script>
</body>
</html>
